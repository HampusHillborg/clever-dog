workflows:
  android-internal:
    name: Android Internal Testing
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      groups:
        # Define in Codemagic UI -> Teams -> Environment variables.
        # Contains GCLOUD_SERVICE_ACCOUNT_CREDENTIALS (JSON for Play Console).
        - google_play
        # Vite needs VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY at build time.
        - cleverdog_supabase
      android_signing:
        # Upload the keystore in Codemagic UI -> Code signing identities.
        # Reference it here by the name you gave it.
        - cleverdog-keystore
      node: 22
    triggering:
      events: [push]
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node deps
        script: npm ci
      - name: Build customer-only web bundle
        script: npm run app:build
      - name: Sync to Android project
        script: npx cap sync android
      - name: Build signed AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

  ios-simulator:
    name: iOS Simulator Build (unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - cleverdog_supabase
      xcode: latest
      node: 22
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    # No `triggering` block on purpose — run this from the Codemagic UI
    # via "Start new build" when you want to verify the iOS build compiles.
    scripts:
      - name: Install Node deps
        script: npm ci
      - name: Build customer-only web bundle
        script: npm run app:build
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
      - name: Build for iOS Simulator (no signing)
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
      - name: Package .app bundle
        script: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r "$CM_BUILD_DIR/App-Simulator.zip" App.app
    artifacts:
      - App-Simulator.zip
      - /tmp/xcodebuild_logs/*.log

